<!DOCTYPE html><!DOCTYPE <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Riesgos Críticos</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    h3 {
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 16px;
      background: #1f4e79;
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .rc-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 768px) {
      .rc-buttons {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .rc-btn {
      border: none;
      background: #e5e7eb;
      color: #111827;
      padding: 12px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .rc-btn.active {
      background: #1f4e79;
      color: white;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #fff;
    }

    .check-item input {
      margin-top: 3px;
      transform: scale(1.2);
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #16a34a;
      transition: width 0.2s;
    }

    .progress-text {
      margin-top: 8px;
      font-weight: bold;
      font-size: 18px;
      color: #16a34a;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    @media (min-width: 768px) {
      .actions {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .action-btn {
      border: none;
      padding: 14px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }

    .btn-save { background: #1d4ed8; }
    .btn-finish { background: #16a34a; }
    .btn-export { background: #111827; }
    .btn-clear { background: #b91c1c; }

    .estado {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
    }

    .muted-title {
      font-size: 14px;
      color: #475569;
      margin-top: 6px;
    }

    .vendor-info {
      margin-top: 8px;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
</head>

    <div class="card">

        <button class="action-btn btn-finish" onclick="finalizar()">FINALIZAR</button>
        <button class="action-btn btn-export" onclick="exportarCSV()">EXPORTAR CSV</button>
        <button class="action-btn btn-clear" onclick="limpiarHistorial()">LIMPIAR HISTORIAL</button>
      </div>

      <div class="estado" id="estado"></div>
    </div>

  </div>

      "RC-23": {

        adicionales: [

          "Uso de epps específicos en áreas remotas"
        ],
        preventivos: [

          "Refugios certificados y señalizados en zonas de trabajo expuestas.",
          "Calibración y mantenimiento de sensores fijos y portátiles.",
          "Verificación previa de condiciones meteorológicas y operativas para desplazamientos en zonas remotas."

          "Pararrayos en áreas expuestas a descargas atmosféricas."
        ]
      }
    };

    let rcActual = "RC07";
    let checks = {};

    function getTodayISO() {
      const d = new Date();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${month}-${day}`;
    }

    function initChecks() {
      checks = {};
      Object.keys(RC_DATA).forEach(rc => {
        checks[rc] = {
          adicionales: RC_DATA[rc].adicionales.map(() => false),
          preventivos: RC_DATA[rc].preventivos.map(() => false),
          mitigantes: RC_DATA[rc].mitigantes.map(() => false)
        };
      });
    }

    function setEstado(texto, color = "#166534") {
      const estado = document.getElementById("estado");
      estado.textContent = texto;
      estado.style.color = color;
    }

    function updateButtons() {
      Object.keys(RC_DATA).forEach(rc => {
        const btn = document.getElementById("btn-" + rc);
        if (btn) {
          if (rc === rcActual) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        }
      });
    }

    function selectRC(rc) {
      rcActual = rc;
      renderRC();
      updateButtons();
    }

    function renderSection(nombre, seccion) {
      const lista = RC_DATA[rcActual][seccion];
      if (!lista || lista.length === 0) return "";

      let html = `<h3>${nombre}</h3>`;
      lista.forEach((texto, index) => {
        const checked = checks[rcActual][seccion][index] ? "checked" : "";
        html += `
          <label class="check-item">
            <input type="checkbox" ${checked} onchange="toggleCheck('${seccion}', ${index})">
            <span>${texto}</span>
          </label>
        `;
      });

      return html;
    }

    function renderRC() {
      document.getElementById("tituloRC").textContent = RC_DATA[rcActual].titulo;
      const contenido = document.getElementById("contenido");

      contenido.innerHTML =
        renderSection("ADICIONALES", "adicionales") +
        renderSection("PREVENTIVOS", "preventivos") +
        renderSection("MITIGANTES", "mitigantes");

      calcular();
    }

    function toggleCheck(seccion, index) {
      checks[rcActual][seccion][index] = !checks[rcActual][seccion][index];
      calcular();
    }

    function getCurrentFlatChecks() {
      return [
        ...checks[rcActual].adicionales,
        ...checks[rcActual].preventivos,
        ...checks[rcActual].mitigantes
      ];
    }

    function calcular() {
      const lista = getCurrentFlatChecks();
      const total = lista.length;
      let marcados = 0;

      lista.forEach(v => {
        if (v) marcados++;
      });

      const pct = total > 0 ? ((marcados / total) * 100) : 0;

      document.getElementById("resultado").textContent = "Cumplimiento: " + pct.toFixed(1) + "%";
      document.getElementById("progressFill").style.width = pct.toFixed(1) + "%";

      return {
        porcentaje: pct.toFixed(1),
        marcados: marcados,
        total: total
      };
    }

    function getSupervisor() {
      return document.getElementById("supervisor").value.trim();
    }

    function getVendor() {
      return document.getElementById("vendor").value.trim();
    }

    function getFecha() {
      return document.getElementById("fecha").value;
    }

    function getObservaciones() {
      return document.getElementById("observaciones").value.trim();
    }

    function obtenerNombreVendor(vendor) {
      return VENDORS[vendor] || null;
    }

    function actualizarVendorInfo() {
      const vendor = getVendor();
      const info = document.getElementById("vendorInfo");

      if (!vendor) {
        info.textContent = "";
        return;
      }

      const nombre = obtenerNombreVendor(vendor);
      if (nombre) {
        info.textContent = "Operador encontrado: " + nombre;
        info.style.color = "#166534";
      } else {
        info.textContent = "Vendor no encontrado";
        info.style.color = "#b91c1c";
      }
    }

    function getControlesAprendidosYFaltantes() {
      const aprendidos = [];
      const faltantes = [];

      ["adicionales", "preventivos", "mitigantes"].forEach(seccion => {
        RC_DATA[rcActual][seccion].forEach((control, i) => {
          if (checks[rcActual][seccion][i]) {
            aprendidos.push(control);
          } else {
            faltantes.push(control);
          }
        });
      });

      return {
        aprendidos: aprendidos.join(" | "),
        faltantes: faltantes.join(" | ")
      };
    }

    async function enviarAGoogle(payload) {
      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });
        console.log("✅ Enviado correctamente a Sheets");
      } catch (error) {
        console.error("❌ Error enviando:", error);
      }
    }

    function guardarLocal() {
      const supervisor = getSupervisor();
      const vendor = getVendor();

      if (!supervisor) {
        setEstado("Selecciona un supervisor.", "#b91c1c");
        return;
      }

      if (!vendor) {
        setEstado("Ingresa el vendor del operador.", "#b91c1c");
        return;
      }

      const nombre = obtenerNombreVendor(vendor);
      if (!nombre) {
        setEstado("Vendor no encontrado", "#b91c1c");
        return;
      }

      const calc = calcular();
      const controles = getControlesAprendidosYFaltantes();

      let historial = JSON.parse(localStorage.getItem("checklist_historial") || "[]");

      historial.push({
        FechaRegistro: new Date().toLocaleString(),
        FechaFormulario: getFecha(),
        Supervisor: supervisor,
        Vendor: vendor,
        Riesgo: RC_DATA[rcActual].titulo,
        ControlesAprendidos: controles.aprendidos,
        ControlesFaltantes: controles.faltantes,
        Cumplimiento: calc.porcentaje,
        Observaciones: getObservaciones()
      });

      localStorage.setItem("checklist_historial", JSON.stringify(historial));

      setEstado("Registro guardado localmente.");
    }

    async function finalizar() {
      const supervisor = getSupervisor();
      const vendor = getVendor();

      if (!supervisor) {
        setEstado("Selecciona un supervisor.", "#b91c1c");
        return;
      }

      if (!vendor) {
        setEstado("Ingresa el vendor del operador.", "#b91c1c");
        return;
      }

      const nombre = obtenerNombreVendor(vendor);
      if (!nombre) {
        setEstado("Vendor no encontrado", "#b91c1c");
        return;
      }

      const calc = calcular();
      const controles = getControlesAprendidosYFaltantes();

      const payload = {
        supervisor: supervisor,
        vendor: vendor,
        riesgo: RC_DATA[rcActual].titulo,
        controlesAprendidos: controles.aprendidos,
        controlesFaltantes: controles.faltantes,
        porcentaje: calc.porcentaje,
        observaciones: getObservaciones()
      };

      try {
        // Guardar también localmente
        let historial = JSON.parse(localStorage.getItem("checklist_historial") || "[]");
        historial.push({
          FechaRegistro: new Date().toLocaleString(),
          FechaFormulario: getFecha(),
          Supervisor: supervisor,
          Vendor: vendor,
          Riesgo: RC_DATA[rcActual].titulo,
          ControlesAprendidos: controles.aprendidos,
          ControlesFaltantes: controles.faltantes,

        });

        limpiarFormulario();

      } catch (error) {
        console.error(error);

    function limpiarFormulario() {

      document.getElementById("vendor").value = "";
      document.getElementById("vendorInfo").textContent = "";
      document.getElementById("fecha").value = getTodayISO();

      initChecks();

    function exportarCSV() {
      const supervisor = getSupervisor();
      const vendor = getVendor();

      if (!supervisor) {
        setEstado("Selecciona un supervisor.", "#b91c1c");
        return;
      }

      if (!vendor) {
        setEstado("Ingresa el vendor del operador.", "#b91c1c");
        return;
      }

      const nombre = obtenerNombreVendor(vendor);
      if (!nombre) {
        setEstado("Vendor no encontrado", "#b91c1c");
        return;
      }

      const calc = calcular();
      const controles = getControlesAprendidosYFaltantes();

      const vendorSeguro = vendor.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");

      let csv = "";
      csv += "Supervisor,Vendor,Tipo de riesgo evaluado,Controles aprendidos,Controles faltantes,% de eficacia,Observaciones\n";
      csv += `"${supervisor}","${vendor}","${RC_DATA[rcActual].titulo.replace(/"/g, '""')}","${controles.aprendidos.replace(/"/g, '""')}","${controles.faltantes.replace(/"/g, '""')}","${calc.porcentaje}%","${getObservaciones().replace(/"/g, '""')}"\n`;

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "Checklist_" + vendorSeguro + ".csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      setEstado("Archivo exportado: Checklist_" + vendorSeguro + ".csv");
    }

    document.addEventListener("DOMContentLoaded", function() {

      document.getElementById("vendor").addEventListener("input", actualizarVendorInfo);

      renderRC();
