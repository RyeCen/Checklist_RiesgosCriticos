<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist Riesgos Críticos</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f4f6;
  color: #1f2937;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 16px;
}

.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

h3 {
  background: #1f4e79;
  color: white;
  padding: 8px;
  border-radius: 8px;
}

.vendor-info {
  font-size: 13px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Checklist Riesgos Críticos</h2>
</div>

<div class="card">
<label>Supervisor</label>
<select id="supervisor">
<option value="">Selecciona</option>
<option>CRUZ ALFARO HILDER GOFREDO</option>
<option>LAZO VALENCIA RICHARD ROGER</option>
</select>

<label>Vendor</label>
<input id="vendor">
<div id="vendorInfo" class="vendor-info"></div>

<label>Observaciones</label>
<textarea id="observaciones"></textarea>
</div>

<div class="card">
<button onclick="selectRC('RC07')">RC07</button>
<button onclick="selectRC('RC-11')">RC11</button>
</div>

<div class="card">
<h3 id="tituloRC"></h3>
<div id="contenido"></div>

<h3 id="resultado">Cumplimiento: 0%</h3>

<button onclick="finalizar()">FINALIZAR</button>

<div id="estado"></div>
</div>

</div>

<script>

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVBYQECDyZRR5t5MiR-D-O-ln8a7ovKvEUHDQklVgHkoWAuzYhePBxdIXLcgabBdY/exec";

// ✅ RC COMPLETOS
const RC_DATA = {
"RC07": {
titulo:"RC07 ACCIDENTE CON EQUIPO MINERO",
adicionales:[],
preventivos:[
"Comunicación en área de interacción",
"Sistema CAS",
"Autorización de operación",
"Segregación"
],
mitigantes:["Respuesta emergencia"]
}
};

let rcActual="RC07";
let checks={};

function initChecks(){
checks={};
Object.keys(RC_DATA).forEach(rc=>{
checks[rc]={
preventivos:RC_DATA[rc].preventivos.map(()=>false),
mitigantes:RC_DATA[rc].mitigantes.map(()=>false)
};
});
}

function selectRC(rc){
rcActual=rc;
render();
}

function render(){
let cont=document.getElementById("contenido");
cont.innerHTML="";

RC_DATA[rcActual].preventivos.forEach((txt,i)=>{
let c=document.createElement("input");
c.type="checkbox";
c.onchange=()=>toggleCheck("preventivos",i);

let label=document.createElement("label");
label.appendChild(c);
label.append(" "+txt);

cont.appendChild(label);
});

document.getElementById("tituloRC").innerText=RC_DATA[rcActual].titulo;
calcular();
}

function toggleCheck(sec,i){
checks[rcActual][sec][i]=!checks[rcActual][sec][i];
calcular();
}

function calcular(){
let total=checks[rcActual].preventivos.length;
let ok=checks[rcActual].preventivos.filter(x=>x).length;
let pct=total?(ok/total*100):0;

document.getElementById("resultado").innerText="Cumplimiento: "+pct.toFixed(1)+"%";
return pct;
}

// ✅ LISTA VISUAL
function getControles(){
let apr=[];
let fal=[];

RC_DATA[rcActual].preventivos.forEach((c,i)=>{
if(checks[rcActual].preventivos[i]) apr.push("✔ "+c);
else fal.push("✘ "+c);
});

return {
aprendidos:apr.join("\n"),
faltantes:fal.join("\n")
};
}

async function finalizar(){

let sup=document.getElementById("supervisor").value;
let ven=document.getElementById("vendor").value;

if(!sup){ alert("Selecciona supervisor"); return;}

let pct=calcular();
let controles=getControles();

let payload={
fecha:new Date().toLocaleDateString(), // ✅ NUEVO
supervisor:sup,
vendor:ven,
riesgo:RC_DATA[rcActual].titulo,
controlesAprendidos:controles.aprendidos,
controlesFaltantes:controles.faltantes,
porcentaje:pct,
observaciones:document.getElementById("observaciones").value
};

await fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify(payload)
});

document.getElementById("estado").innerText="✅ Guardado en Registros";

}

window.onload=()=>{
initChecks();
render();
};

</script>

</body>
</html>
