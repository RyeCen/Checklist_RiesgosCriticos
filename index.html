<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist RC</title>

<style>
body{font-family:Arial;background:#f3f4f6;padding:10px}
.card{background:white;padding:12px;border-radius:12px;margin-bottom:10px}
button{padding:10px;margin:4px;font-weight:bold;border:none;border-radius:8px}
h3{background:#1f4e79;color:white;padding:8px;border-radius:8px}
.check{display:block;margin-bottom:6px}
</style>

</head>

<body>

<h2>Checklist Riesgos Críticos</h2>

<div class="card">
Operador:<br>
<input id="operador" style="width:100%;padding:8px"><br><br>

Fecha:<br>
<input type="date" id="fecha"><br><br>

Observaciones:<br>
<textarea id="obs" style="width:100%;padding:8px"></textarea>
</div>

<div class="card">
<button onclick="cargarRC('RC07')">RC07</button>
<button onclick="cargarRC('RC11')">RC-11</button>
<button onclick="cargarRC('RC12')">RC-12</button>
<button onclick="cargarRC('RC13')">RC-13</button>
<button onclick="cargarRC('RC23')">RC-23</button>
</div>

<div class="card">

<h2 id="titulo"></h2>

<div id="contenido"></div>

<h2 id="resultado">0%</h2>

<button style="background:green;color:white" onclick="finalizar()">FINALIZAR</button>
<button style="background:black;color:white" onclick="exportar()">EXPORTAR CSV</button>

<p id="estado"></p>

</div>

<script>

let rcActual = "RC07";

let DATA = {

RC07:{
titulo:"RC07 ACCIDENTE CON EQUIPO MINERO",
adicionales:[],
preventivos:[
"Protocolo de comunicación en área de interacción",
"Sistema CAS y SAF",
"Autorización de operación",
"Segregación de áreas",
"Diseño de vías",
"Mantenimiento crítico",
"Gestión de fatiga"
],
mitigantes:[
"Brigadas",
"Parachoques"
]
},

RC11:{
titulo:"RC-11 EXPLOSIVOS",
adicionales:[],
preventivos:[
"Detección tiro cortado",
"Comunicación voladura",
"Segregación zona",
"Evacuación",
"Almacenamiento",
"Operador autorizado",
"Transporte",
"Diseño voladura"
],
mitigantes:[
"Control tiro",
"Brigada"
]
},

RC12:{
titulo:"RC-12 ATROPELLO",
adicionales:[],
preventivos:[
"Segregación",
"Mantenimiento",
"Bloqueo",
"Comunicación",
"Conducción"
],
mitigantes:[
"Brigada"
]
},

RC13:{
titulo:"RC-13 CAIDA ROCAS",
adicionales:[],
preventivos:[
"Diseño geotécnico",
"Monitoreo",
"Inspección",
"Señalización",
"Control taludes"
],
mitigantes:[
"Estructuras protección"
]
},

RC23:{
titulo:"RC-23 TORMENTAS ELÉCTRICAS",
adicionales:[
"Capacitación tormentas",
"EPP remoto"
],
preventivos:[
"Comunicación radial",
"Refugios",
"Sensores",
"Verificación clima"
],
mitigantes:[
"Brigadas",
"Pararrayos"
]
}

};

let checks = {};

function initChecks(){
checks = {};
for(let rc in DATA){
checks[rc]={adicionales:[],preventivos:[],mitigantes:[]};
["adicionales","preventivos","mitigantes"].forEach(sec=>{
checks[rc][sec] = DATA[rc][sec].map(()=>false);
});
}
}

function cargarRC(rc){
rcActual = rc;
render();
}

function render(){

let cont = document.getElementById("contenido");
cont.innerHTML = "";

document.getElementById("titulo").innerText = DATA[rcActual].titulo;

["adicionales","preventivos","mitigantes"].forEach(sec=>{

let lista = DATA[rcActual][sec];
if(lista.length==0) return;

let titulo = document.createElement("h3");
titulo.innerText = sec.toUpperCase();
cont.appendChild(titulo);

lista.forEach((txt,i)=>{
let label=document.createElement("label");
label.className="check";

let c=document.createElement("input");
c.type="checkbox";
c.checked = checks[rcActual][sec][i];

c.onchange=()=>{
checks[rcActual][sec][i]=c.checked;
calcular();
};

label.appendChild(c);
label.append(" "+txt);

cont.appendChild(label);
});

});

calcular();
}

function calcular(){

let total=0;
let ok=0;

["adicionales","preventivos","mitigantes"].forEach(sec=>{
checks[rcActual][sec].forEach(v=>{
total++;
if(v) ok++;
});
});

let pct = total? (ok/total*100):0;

document.getElementById("resultado").innerText =
"Cumplimiento: "+pct.toFixed(1)+"%";

return pct;
}

function enviarAGoogle(data){
fetch("https://script.google.com/macros/s/AKfycbx2XU5y3NCQ6YCgizSOtuxBMpHdPCWgeU5shXdQqVwbTHJDfO3DrpK9AEA5wjoRv4K7/exec",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
}

function finalizar(){

let operador = document.getElementById("operador").value;

if(operador==""){
alert("Ingrese operador");
return;
}

let pct = calcular();

let data = {
operador: operador,
rc: rcActual,
porcentaje: pct,
fecha: document.getElementById("fecha").value,
observaciones: document.getElementById("obs").value
};

enviarAGoogle(data);

document.getElementById("estado").innerText = "✅ Enviado a Google Sheets";

limpiar();

}

function limpiar(){
document.getElementById("operador").value="";
document.getElementById("obs").value="";
initChecks();
render();
}

function exportar(){

let operador = document.getElementById("operador").value;

if(operador==""){
alert("Ingrese operador");
return;
}

let pct = calcular();

let csv="Operador,RC,Porcentaje\n";
csv+=operador+","+rcActual+","+pct;

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="Checklist_"+operador+".csv";
a.click();
}

window.onload=function(){
initChecks();
document.getElementById("fecha").value =
new Date().toISOString().slice(0,10);
cargarRC("RC07");
};

</script>

</body>
</html>
``
