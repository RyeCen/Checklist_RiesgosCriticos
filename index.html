<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Riesgos Críticos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    h2 {
      margin: 0;
      font-size: 22px;
    }

    h3 {
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 16px;
      background: #1f4e79;
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .rc-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 768px) {
      .rc-buttons {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .rc-btn {
      border: none;
      background: #e5e7eb;
      color: #111827;
      padding: 12px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .rc-btn.active {
      background: #1f4e79;
      color: white;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #fff;
    }

    .check-item input {
      margin-top: 3px;
      transform: scale(1.2);
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #16a34a;
      transition: width 0.2s;
    }

    .progress-text {
      margin-top: 8px;
      font-weight: bold;
      font-size: 18px;
      color: #16a34a;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    @media (min-width: 768px) {
      .actions {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .action-btn {
      border: none;
      padding: 14px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      font-size: 14px;
    }

    .btn-save {
      background: #1d4ed8;
    }

    .btn-finish {
      background: #16a34a;
    }

    .btn-export {
      background: #111827;
    }

    .btn-clear {
      background: #b91c1c;
    }

    .estado {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #6b7280;
    }

    .muted-title {
      font-size: 14px;
      color: #475569;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>Checklist Riesgos Críticos</h1>
      <div class="small">Versión web para celular / PC. Funciona en navegador y exporta CSV para Excel.</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label for="operador">Operador</label>
          <input type="text" id="operador" placeholder="Nombre del operador">
        </div>
        <div>
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha">
        </div>
      </div>

      <div style="margin-top:12px;">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" placeholder="Observaciones de la evaluación"></textarea>
      </div>
    </div>

    <div class="card">
      <label>Selecciona el RC</label>
      <div class="rc-buttons">
        <button class="rc-btn" id="btn-RC07" onclick="selectRC('RC07')">RC07</button>
        <button class="rc-btn" id="btn-RC-11" onclick="selectRC('RC-11')">RC-11</button>
        <button class="rc-btn" id="btn-RC-12" onclick="selectRC('RC-12')">RC-12</button>
        <button class="rc-btn" id="btn-RC-13" onclick="selectRC('RC-13')">RC-13</button>
        <button class="rc-btn" id="btn-RC-23" onclick="selectRC('RC-23')">RC-23</button>
      </div>
    </div>

    <div class="card">
      <h2 id="tituloRC">RC07 ACCIDENTE CON EQUIPO MINERO</h2>
      <div class="muted-title" id="detalleRC">Marca los controles críticos verificados.</div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="resultado">Cumplimiento: 0.0%</div>
      </div>

      <div id="contenido" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <div class="actions">
        <button class="action-btn btn-save" onclick="guardarLocal()">GUARDAR LOCAL</button>
        <button class="action-btn btn-finish" onclick="finalizar()">FINALIZAR</button>
        <button class="action-btn btn-export" onclick="exportarCSV()">EXPORTAR CSV</button>
        <button class="action-btn btn-clear" onclick="limpiarHistorial()">LIMPIAR HISTORIAL</button>
      </div>

      <div class="estado" id="estado"></div>
    </div>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2XU5y3NCQ6YCgizSOtuxBMpHdPCWgeU5shXdQqVwbTHJDfO3DrpK9AEA5wjoRv4K7/exec";

    const RC_DATA = {
      "RC07": {
        titulo: "RC07 ACCIDENTE CON EQUIPO MINERO",
        adicionales: [],
        preventivos: [
          "Protocolo de comunicación en área de interacción.",
          "Sistema de Aproximación (CAS) y Sistema Antifatiga (SAF).",
          "Autorización de operación y manejo de equipos.",
          "Segregación y señalización en áreas de interacción.",
          "Diseño y control de mejoramiento de vías.",
          "Mantenimiento programado de sistemas críticos: frenos, dirección, eléctrico -electrónico y neumáticos.",
          "Gestión de fatiga y somnolencia."
        ],
        mitigantes: [
          "Brigadas de respuesta a emergencias (comunicación, equipamiento y competencias).",
          "Parachoques extendidos."
        ]
      },

      "RC-11": {
        titulo: "RC-11 ACCIDENTE CON EXPLOSIVOS",
        adicionales: [],
        preventivos: [
          "Detección y desactivación del tiro cortado.",
          "Comunicación del programa de voladura",
          "Segregación y señalización de la zona de voladura.",
          "Evacuación de área del personal y equipos por voladura.",
          "Cumplimiento de requisitos para el almacenamiento de explosivos.",
          "Operador autorizado para la manipulación de explosivos.",
          "Cumplimiento de requisitos para transporte interno de explosivos.",
          "Cumplimiento con el diseño de perforación y voladura.",
          "Restricción de trabajos de interfase en plataformas superiores a malla cargada."
        ],
        mitigantes: [
          "Detección y desactivación del tiro cortado.",
          "Brigadas de respuesta a emergencias (comunicación, equipamiento y competencias)."
        ]
      },

      "RC-12": {
        titulo: "RC-12 ATROPELLO DE PERSONAL POR VEHICULOS O EQUIPOS EN TRANSITO",
        adicionales: [],
        preventivos: [
          "Segregación en áreas de interacción.",
          "Mantenimiento programado de sistemas críticos: frenos, dirección, eléctrico - electrónico y neumáticos.",
          "Parqueo de vehículos o bloqueo de equipos en mantenimiento.",
          "Protocolo de comunicación en áreas de interacción.",
          "Autorización de conducción."
        ],
        mitigantes: [
          "Brigadas de respuesta a emergencia (comunicación, equipamiento y competencias)."
        ]
      },

      "RC-13": {
        titulo: "RC-13 ACCIDENTE POR CAIDA DE ROCAS",
        adicionales: [],
        preventivos: [
          "Control del Diseño Geotécnico.",
          "Monitoreo geotécnico en zonas críticas.",
          "Inspecciones geotécnicas periódicas.",
          "Identificación, señalización y segregación de sectores críticos e inestables.",
          "Plano de riesgos geotécnicos.",
          "Diseño y ejecución de perforación, voladura para control de taludes y fly rocks.",
          "Ejecución/operación y cumplimiento del diseño geotécnico."
        ],
        mitigantes: [
          "Estructuras de protección."
        ]
      },

      "RC-23": {
        titulo: "RC-23 CAIDA DE RAYOS- TORMENTAS ELECTRICAS",
        adicionales: [
          "Capacitación a personal en la detección visual de tormentas eléctricas, niveles de alerta, uso de refugios y uso de detectores portátiles.",
          "Uso de epps específicos en áreas remotas"
        ],
        preventivos: [
          "Sistema radial y protocolo de comunicación.",
          "Refugios certificados y señalizados en zonas de trabajo expuestas.",
          "Calibración y mantenimiento de sensores fijos y portátiles.",
          "Verificación previa de condiciones meteorológicas y operativas para desplazamientos en zonas remotas."
        ],
        mitigantes: [
          "Brigadas de respuesta a emergencias (comunicación, equipamiento y competencias).",
          "Pararrayos en áreas expuestas a descargas atmosféricas."
        ]
      }
    };

    let rcActual = "RC07";
    let checks = {};

    function getTodayISO() {
      const d = new Date();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${month}-${day}`;
    }

    function initChecks() {
      checks = {};
      Object.keys(RC_DATA).forEach(rc => {
        checks[rc] = {
          adicionales: RC_DATA[rc].adicionales.map(() => false),
          preventivos: RC_DATA[rc].preventivos.map(() => false),
          mitigantes: RC_DATA[rc].mitigantes.map(() => false)
        };
      });
    }

    function setEstado(texto, color = "#166534") {
      const estado = document.getElementById("estado");
      estado.textContent = texto;
      estado.style.color = color;
    }

    function updateButtons() {
      Object.keys(RC_DATA).forEach(rc => {
        const btn = document.getElementById("btn-" + rc);
        if (btn) {
          if (rc === rcActual) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        }
      });
    }

    function selectRC(rc) {
      rcActual = rc;
      renderRC();
      updateButtons();
    }

    function renderSection(nombre, seccion) {
      const lista = RC_DATA[rcActual][seccion];
      if (!lista || lista.length === 0) return "";

      let html = `<h3>${nombre}</h3>`;
      lista.forEach((texto, index) => {
        const checked = checks[rcActual][seccion][index] ? "checked" : "";
        html += `
          <label class="check-item">
            <input type="checkbox" ${checked} onchange="toggleCheck('${seccion}', ${index})">
            <span>${texto}</span>
          </label>
        `;
      });

      return html;
    }

    function renderRC() {
      document.getElementById("tituloRC").textContent = RC_DATA[rcActual].titulo;
      const contenido = document.getElementById("contenido");

      contenido.innerHTML =
        renderSection("ADICIONALES", "adicionales") +
        renderSection("PREVENTIVOS", "preventivos") +
        renderSection("MITIGANTES", "mitigantes");

      calcular();
    }

    function toggleCheck(seccion, index) {
      checks[rcActual][seccion][index] = !checks[rcActual][seccion][index];
      calcular();
    }

    function getCurrentFlatChecks() {
      return [
        ...checks[rcActual].adicionales,
        ...checks[rcActual].preventivos,
        ...checks[rcActual].mitigantes
      ];
    }

    function calcular() {
      const lista = getCurrentFlatChecks();
      const total = lista.length;
      let marcados = 0;

      lista.forEach(v => {
        if (v) marcados++;
      });

      const pct = total > 0 ? ((marcados / total) * 100) : 0;

      document.getElementById("resultado").textContent = "Cumplimiento: " + pct.toFixed(1) + "%";
      document.getElementById("progressFill").style.width = pct.toFixed(1) + "%";

      return {
        porcentaje: pct.toFixed(1),
        marcados: marcados,
        total: total
      };
    }

    function getOperador() {
      return document.getElementById("operador").value.trim();
    }

    function getFecha() {
      return document.getElementById("fecha").value;
    }

    function getObservaciones() {
      return document.getElementById("observaciones").value.trim();
    }

    function getRecord() {
      const operador = getOperador();
      if (!operador) {
        setEstado("Ingresa el nombre del operador.", "#b91c1c");
        return null;
      }

      const calc = calcular();

      return {
        FechaRegistro: new Date().toLocaleString(),
        FechaFormulario: getFecha(),
        Operador: operador,
        RC: rcActual,
        Titulo: RC_DATA[rcActual].titulo,
        ControlesMarcados: calc.marcados,
        TotalControles: calc.total,
        Cumplimiento: calc.porcentaje,
        Observaciones: getObservaciones(),
        Detalle: [
          ...RC_DATA[rcActual].adicionales.map((c, i) => ({
            Seccion: "ADICIONALES",
            Control: c,
            Marcado: checks[rcActual].adicionales[i] ? "Sí" : "No"
          })),
          ...RC_DATA[rcActual].preventivos.map((c, i) => ({
            Seccion: "PREVENTIVOS",
            Control: c,
            Marcado: checks[rcActual].preventivos[i] ? "Sí" : "No"
          })),
          ...RC_DATA[rcActual].mitigantes.map((c, i) => ({
            Seccion: "MITIGANTES",
            Control: c,
            Marcado: checks[rcActual].mitigantes[i] ? "Sí" : "No"
          }))
        ]
      };
    }

    async function enviarAGoogle(record) {
      const payload = {
        operador: record.Operador,
        rc: record.RC,
        porcentaje: record.Cumplimiento,
        fecha: record.FechaFormulario,
        observaciones: record.Observaciones
      };

      // mode:no-cors evita problemas de CORS desde GitHub Pages hacia Apps Script
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });
    }

    function guardarLocal() {
      const record = getRecord();
      if (!record) return;

      let historial = JSON.parse(localStorage.getItem("checklist_historial") || "[]");
      historial.push(record);
      localStorage.setItem("checklist_historial", JSON.stringify(historial));

      setEstado("Registro guardado localmente para " + record.Operador + " (" + record.RC + ").");
    }

    async function finalizar() {
      const record = getRecord();
      if (!record) return;

      try {
        // 1) Guardar local
        let historial = JSON.parse(localStorage.getItem("checklist_historial") || "[]");
        historial.push(record);
        localStorage.setItem("checklist_historial", JSON.stringify(historial));

        // 2) Enviar al Google Sheet
        await enviarAGoogle(record);

        // 3) Limpiar para siguiente registro
        limpiarFormulario();

        // 4) Mensaje final
        setEstado("✅ Registrado en Google Sheets y listo para un nuevo registro.");
      } catch (error) {
        console.error(error);
        setEstado("❌ No se pudo enviar al Google Sheet. Revisa conexión o permisos del Apps Script.", "#b91c1c");
      }
    }

    function limpiarFormulario() {
      document.getElementById("operador").value = "";
      document.getElementById("fecha").value = getTodayISO();
      document.getElementById("observaciones").value = "";
      initChecks();
      rcActual = "RC07";
      renderRC();
      updateButtons();
    }

    function limpiarHistorial() {
      localStorage.removeItem("checklist_historial");
      setEstado("Historial local eliminado.", "#b91c1c");
    }

    function exportarCSV() {
      const record = getRecord();
      if (!record) return;

      const operadorSeguro = record.Operador.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_");

      let csv = "";
      csv += "Resumen\n";
      csv += "FechaRegistro,FechaFormulario,Operador,RC,Titulo,ControlesMarcados,TotalControles,Cumplimiento,Observaciones\n";
      csv += `"${record.FechaRegistro}","${record.FechaFormulario}","${record.Operador}","${record.RC}","${record.Titulo}","${record.ControlesMarcados}","${record.TotalControles}","${record.Cumplimiento}%","${record.Observaciones.replace(/"/g, '""')}"\n`;

      csv += "\nDetalle\n";
      csv += "Seccion,Control,Marcado\n";
      record.Detalle.forEach(d => {
        csv += `"${d.Seccion}","${d.Control.replace(/"/g, '""')}","${d.Marcado}"\n`;
      });

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "Checklist_" + operadorSeguro + ".csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      setEstado("Archivo exportado: Checklist_" + operadorSeguro + ".csv");
    }

    window.onload = function() {
      document.getElementById("fecha").value = getTodayISO();
      initChecks();
      renderRC();
      updateButtons();
    };
  </script>
</body>
</html>
